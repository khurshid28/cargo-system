name: materialmarket_customer
description: MaterialMarket — Customer mobile app (xaridor).
publish_to: "none"
version: 0.0.1+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.19.0"

dependencies:
  flutter: { sdk: flutter }
  flutter_localizations: { sdk: flutter }
  flutter_bloc: ^8.1.5
  bloc: ^8.1.4
  equatable: ^2.0.5
  get_it: ^7.7.0
  dartz: ^0.10.1
  go_router: ^14.0.2
  dio: ^5.4.3
  pretty_dio_logger: ^1.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.0.0
  iconsax_flutter: ^1.0.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_native_splash: ^2.4.0
  lottie: ^3.1.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  intl: ^0.20.2
  flutter_dotenv: ^5.1.0
  firebase_core: ^3.1.0
  firebase_messaging: ^15.0.1

dev_dependencies:
  flutter_test: { sdk: flutter }
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/
    - assets/lottie/

flutter_native_splash:
  color: "#10B981"
  image: assets/images/splash_logo.png
  android_12:
    color: "#10B981"
    image: assets/images/splash_logo.png
