name: cargos

services:
  postgres-tc:
    image: postgis/postgis:16-3.4
    container_name: cargos-postgres-tc
    restart: unless-stopped
    environment:
      POSTGRES_USER: tc
      POSTGRES_PASSWORD: tc_dev_pass
      POSTGRES_DB: transcargo
    ports:
      - "5433:5432"
    volumes:
      - postgres_tc_data:/var/lib/postgresql/data
      - ./init-scripts/tc:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tc -d transcargo"]
      interval: 5s
      timeout: 5s
      retries: 10

  postgres-mm:
    image: postgres:16-alpine
    container_name: cargos-postgres-mm
    restart: unless-stopped
    environment:
      POSTGRES_USER: mm
      POSTGRES_PASSWORD: mm_dev_pass
      POSTGRES_DB: materialmarket
    ports:
      - "5434:5432"
    volumes:
      - postgres_mm_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mm -d materialmarket"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: cargos-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: cargos-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: cargos
      RABBITMQ_DEFAULT_PASS: cargos_dev_pass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: cargos-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: cargos
      MINIO_ROOT_PASSWORD: cargos_dev_pass
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10

  mailhog:
    image: mailhog/mailhog:latest
    container_name: cargos-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_tc_data:
  postgres_mm_data:
  redis_data:
  rabbitmq_data:
  minio_data:
